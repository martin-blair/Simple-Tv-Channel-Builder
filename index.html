<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Toonami After Hours</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
:root {
    --glow-blue: #00bfff;
    --text-blue: #bff6ff;
    --bg-deep: #020617;
    --panel-bg: rgba(2, 6, 23, 0.94);
    --panel-border: rgba(111, 220, 255, 0.25);
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    overflow: hidden;
    font-family: Arial, Helvetica, sans-serif;
    color: white;
    background:
        radial-gradient(circle at center, #0a1035 0%, #020617 40%, #000000 100%);
    display: flex;
    justify-content: center;
    align-items: center;
}

.channel-brand {
    position: absolute;
    top: 38px;
    left: 50%;
    transform: translateX(-50%);
    color: #6fdcff;
    font-size: clamp(1.1rem, 2vw, 2rem);
    font-weight: 900;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    text-shadow:
        0 0 10px var(--glow-blue),
        0 0 30px var(--glow-blue);
    opacity: 0.95;
    z-index: 10;
    white-space: nowrap;
}

.stage {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100vw;
    height: 100vh;
}

.ambient {
    position: absolute;
    width: 1200px;
    height: 700px;
    background: radial-gradient(
        ellipse at center,
        rgba(0,120,255,0.20),
        rgba(0,120,255,0.08) 35%,
        transparent 72%
    );
    filter: blur(80px);
    z-index: 0;
}

.tv-shell {
    position: relative;
    width: min(82vw, 1250px);
    aspect-ratio: 16 / 9;
    overflow: hidden;
    background: #000;
    border-radius: 28px;
    border: 3px solid rgba(120,180,255,0.16);
    box-shadow:
        0 0 15px rgba(0,180,255,0.7),
        0 0 50px rgba(0,140,255,0.5),
        0 0 120px rgba(0,100,255,0.25),
        inset 0 0 80px rgba(255,255,255,0.05),
        inset 0 0 140px rgba(0,0,0,0.8);
    z-index: 2;
}

.tv-shell::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
        radial-gradient(circle at center,
        transparent 54%,
        rgba(0,0,0,0.38) 100%);
    pointer-events: none;
    z-index: 5;
}

.tv-shell::after {
    content: "";
    position: absolute;
    top: 0;
    left: -42%;
    width: 62%;
    height: 100%;
    background: linear-gradient(
        120deg,
        rgba(255,255,255,0.13),
        rgba(255,255,255,0.035),
        transparent 70%
    );
    transform: skewX(-12deg);
    pointer-events: none;
    z-index: 6;
}

video {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    background: #000;
    filter: contrast(1.08) saturate(1.10) brightness(0.96);
}

.crt {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
        repeating-linear-gradient(
            to bottom,
            rgba(255,255,255,0.035) 0px,
            rgba(255,255,255,0.035) 1px,
            transparent 2px,
            transparent 4px
        );
    opacity: 0.35;
    animation: flicker 0.12s infinite;
    z-index: 4;
}

.vignette {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
        radial-gradient(circle at center,
            transparent 35%,
            rgba(0,0,0,0.12) 62%,
            rgba(0,0,0,0.48) 100%);
    z-index: 7;
}

.channel-label {
    position: absolute;
    bottom: 16px;
    left: 22px;
    color: var(--text-blue);
    font-size: clamp(1rem, 1.7vw, 1.45rem);
    font-weight: 900;
    letter-spacing: 0.06em;
    text-shadow:
        0 0 5px #00d9ff,
        0 0 12px #00d9ff,
        0 0 24px rgba(0,217,255,0.5);
    z-index: 9;
}

.status {
    position: absolute;
    top: 14px;
    right: 18px;
    padding: 6px 10px;
    border: 1px solid rgba(191,246,255,0.25);
    border-radius: 999px;
    color: rgba(191,246,255,0.9);
    background: rgba(0,0,0,0.35);
    font-size: 0.78rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    text-shadow: 0 0 8px rgba(0,217,255,0.5);
    z-index: 9;
}

.guide-button {
    position: absolute;
    top: 14px;
    left: 18px;
    z-index: 12;
    border: 1px solid rgba(191,246,255,0.35);
    border-radius: 999px;
    background: rgba(0,0,0,0.45);
    color: var(--text-blue);
    padding: 8px 13px;
    font-size: 0.82rem;
    font-weight: 900;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    text-shadow: 0 0 8px rgba(0,217,255,0.55);
    box-shadow: 0 0 14px rgba(0,191,255,0.18);
}

.guide-button:hover {
    background: rgba(0,191,255,0.16);
}

.guide-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.22s ease;
    z-index: 20;
}

.guide-overlay.open {
    opacity: 1;
    pointer-events: auto;
}

.guide-panel {
    position: fixed;
    top: 0;
    right: 0;
    width: min(460px, 92vw);
    height: 100vh;
    background: var(--panel-bg);
    border-left: 1px solid var(--panel-border);
    box-shadow:
        -10px 0 40px rgba(0,0,0,0.65),
        0 0 30px rgba(0,191,255,0.18);
    transform: translateX(105%);
    transition: transform 0.25s ease;
    z-index: 21;
    display: flex;
    flex-direction: column;
}

.guide-panel.open {
    transform: translateX(0);
}

.guide-header {
    padding: 22px 22px 16px;
    border-bottom: 1px solid rgba(191,246,255,0.16);
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: flex-start;
}

.guide-title {
    margin: 0;
    color: #6fdcff;
    font-size: 1.3rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-shadow: 0 0 15px rgba(0,191,255,0.65);
}

.guide-subtitle {
    margin: 6px 0 0;
    color: rgba(191,246,255,0.72);
    font-size: 0.85rem;
}

.guide-close {
    border: 1px solid rgba(191,246,255,0.3);
    background: rgba(255,255,255,0.04);
    color: white;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.15rem;
}

.guide-content {
    padding: 16px 18px 24px;
    overflow-y: auto;
}

.now-card {
    border: 1px solid rgba(111,220,255,0.28);
    background: linear-gradient(135deg, rgba(0,191,255,0.16), rgba(0,0,0,0.32));
    border-radius: 18px;
    padding: 14px;
    margin-bottom: 16px;
    box-shadow: 0 0 18px rgba(0,191,255,0.12);
}

.now-label {
    color: rgba(191,246,255,0.78);
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 8px;
}

.now-title {
    font-size: 1.2rem;
    font-weight: 900;
    margin-bottom: 4px;
}

.now-subtitle {
    color: rgba(255,255,255,0.82);
    font-size: 0.92rem;
    margin-bottom: 10px;
}

.progress-wrap {
    height: 7px;
    border-radius: 999px;
    background: rgba(255,255,255,0.15);
    overflow: hidden;
    margin: 10px 0 8px;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00bfff, #bff6ff);
    box-shadow: 0 0 12px rgba(0,191,255,0.75);
}

.now-time {
    color: rgba(191,246,255,0.72);
    font-size: 0.78rem;
}

.programme {
    display: grid;
    grid-template-columns: 78px 1fr;
    gap: 12px;
    padding: 13px 4px;
    border-bottom: 1px solid rgba(191,246,255,0.11);
}

.programme-time {
    color: rgba(191,246,255,0.72);
    font-size: 0.78rem;
    line-height: 1.35;
}

.programme-title {
    font-weight: 900;
    font-size: 0.98rem;
    margin-bottom: 3px;
}

.programme-subtitle {
    color: rgba(255,255,255,0.76);
    font-size: 0.85rem;
    margin-bottom: 5px;
}

.programme-desc {
    color: rgba(255,255,255,0.55);
    font-size: 0.78rem;
    line-height: 1.35;
}

.guide-error {
    color: #ffd0d0;
    border: 1px solid rgba(255,120,120,0.3);
    background: rgba(255,0,0,0.08);
    border-radius: 14px;
    padding: 12px;
}

@keyframes flicker {
    0% { opacity: 0.31; }
    50% { opacity: 0.39; }
    100% { opacity: 0.33; }
}

@media (max-width: 800px) {
    .tv-shell {
        width: 94vw;
        border-radius: 18px;
    }

    .channel-brand {
        top: 18px;
        letter-spacing: 0.2em;
    }

    .status {
        display: none;
    }

    .guide-button {
        top: auto;
        bottom: 16px;
        right: 16px;
        left: auto;
    }
}
</style>
</head>

<body>
 <main class="stage">
 <div class="ambient"></div>
 <div class="channel-brand">Toonami After Hours</div>

 <section class="tv-shell" aria-label="Toonami After Hours live player">
 <video id="video" autoplay muted controls playsinline></video>
 <button class="guide-button" id="guideButton" type="button">Guide</button>
 <div class="crt"></div>
 <div class="vignette"></div>
 <div class="status" id="status">Live</div>
 <div class="channel-label" id="channelLabel">Toonami</div>
 </section>
 </main>

 <div class="guide-overlay" id="guideOverlay"></div>

 <aside class="guide-panel" id="guidePanel" aria-label="TV Guide">
 <div class="guide-header">
 <div>
 <h2 class="guide-title">TV Guide</h2>
 <p class="guide-subtitle" id="guideUpdated">Loading schedule...</p>
 </div>
 <button class="guide-close" id="guideClose" type="button" aria-label="Close guide">×</button>
 </div>
 <div class="guide-content" id="guideContent">
 <div class="now-card">
 <div class="now-label">Loading</div>
 <div class="now-title">Fetching generated guide...</div>
 </div>
 </div>
 </aside>

<script>
const video = document.getElementById('video');
const channelLabel = document.getElementById('channelLabel');
const statusBadge = document.getElementById('status');

const guideButton = document.getElementById('guideButton');
const guideClose = document.getElementById('guideClose');
const guidePanel = document.getElementById('guidePanel');
const guideOverlay = document.getElementById('guideOverlay');
const guideContent = document.getElementById('guideContent');
const guideUpdated = document.getElementById('guideUpdated');

// Generated Toonami HLS endpoints.
const videoSrc = 'https://mbmedia.galatea.bysh.me/toonami-live/index.m3u8';
const xmltvSrc = 'https://mbmedia.galatea.bysh.me/toonami-live/xmltv.xml';

// The health monitor checks the same HLS playlist the player uses.
let playlistHealthSrc = videoSrc;
let guideChannelId = null;

let hls = null;
let reloadTimer = null;
let recoveryAttempts = 0;
const maxRecoveryAttempts = 8;

let healthCheckTimer = null;
let healthLastSegment = '';
let healthLastSegmentChangedAt = Date.now();
let streamWasDown = false;
let lastHealthReloadAt = 0;
const healthCheckIntervalMs = 5000;
const maxProgramLagSeconds = 90;
const maxSameSegmentSeconds = 45;
const healthReloadCooldownMs = 120000;

let guidePrograms = [];

function absolutizeUrl(url, baseUrl) {
    return new URL(url, baseUrl)
        .href
        .replace('http://localhost:8409', ersatzTvBaseUrl)
        .replace('http://127.0.0.1:8409', ersatzTvBaseUrl);
}

async function resolveStreamUrlFromM3u() {
    const response = await fetch(m3uSrc, {
        cache: 'no-store',
        headers: {
            'Cache-Control': 'no-cache',
            'Pragma': 'no-cache'
        }
    });

    if (!response.ok) {
        throw new Error(`M3U request failed: ${response.status}`);
    }

    const m3uText = await response.text();
    const lines = m3uText.split(/\r?\n/).map(function (line) {
        return line.trim();
    }).filter(Boolean);

    let selectedUrl = '';
    let previousInfo = '';

    for (const line of lines) {
        if (line.startsWith('#EXTINF')) {
            previousInfo = line.toLowerCase();
            continue;
        }

        if (line.startsWith('#')) {
            continue;
        }

        const isPreferred = previousInfo.includes(preferredChannelName) || previousInfo.includes(`chno=\"${preferredChannelNumber}\"`);
        const url = absolutizeUrl(line, m3uSrc);

        if (isPreferred) {
            selectedUrl = url;
            break;
        }

        if (!selectedUrl) {
            selectedUrl = url;
        }
    }

    if (!selectedUrl) {
        throw new Error('No playable channel URL found in ErsatzTV M3U.');
    }

    return selectedUrl;
}

function setStatus(text) {
    statusBadge.textContent = text;
}

function setLabel(text) {
    channelLabel.textContent = text;
}

function safePlay() {
    video.play().catch(function () {});
}

function schedulePageReload(reason) {
    console.warn('Scheduling page reload:', reason);

    if (reloadTimer) return;

    setStatus('Retrying');
    setLabel('Recovering stream...');

    reloadTimer = setTimeout(function () {
        window.location.reload();
    }, 5000);
}

function getLastPlaylistSegment(playlistText) {
    const lines = playlistText.split(/\r?\n/).map(function (line) {
        return line.trim();
    }).filter(function (line) {
        return line && !line.startsWith('#');
    });

    return lines.length ? lines[lines.length - 1] : '';
}

function getLastPlaylistProgramTime(playlistText) {
    const matches = Array.from(playlistText.matchAll(/^#EXT-X-PROGRAM-DATE-TIME:(.+)$/gm));
    return matches.length ? matches[matches.length - 1][1].trim() : '';
}

function secondsSincePlaylistTime(value) {
    const parsed = Date.parse(value);
    if (Number.isNaN(parsed)) return Infinity;
    return Math.floor((Date.now() - parsed) / 1000);
}

function reloadPlayerAfterHealthRecovery(reason) {
    const now = Date.now();

    if (now - lastHealthReloadAt < healthReloadCooldownMs) {
        console.warn('Health reload suppressed by cooldown:', reason);
        return;
    }

    lastHealthReloadAt = now;
    console.warn('Reloading page after stream recovery:', reason);
    setStatus('Reconnected');
    setLabel('Stream recovered. Reloading...');

    setTimeout(function () {
        window.location.reload();
    }, 1200);
}

async function checkPlaylistHealth() {
    try {
        const response = await fetch(playlistHealthSrc, {
            cache: 'no-store',
            headers: {
                'Cache-Control': 'no-cache',
                'Pragma': 'no-cache'
            }
        });

        if (!response.ok) {
            streamWasDown = true;
            setStatus('Reconnecting');
            setLabel('Waiting for stream...');
            console.warn('Playlist health request failed:', response.status);
            return;
        }

        const playlistText = await response.text();
        const currentSegment = getLastPlaylistSegment(playlistText);
        const programTime = getLastPlaylistProgramTime(playlistText);
        const lag = programTime ? secondsSincePlaylistTime(programTime) : 0;

        if (!currentSegment) {
            streamWasDown = true;
            setStatus('Reconnecting');
            setLabel('Waiting for stream...');
            console.warn('Playlist health found no segment.');
            return;
        }

        if (currentSegment !== healthLastSegment) {
            healthLastSegment = currentSegment;
            healthLastSegmentChangedAt = Date.now();
        }

        const sameSegmentSeconds = Math.floor((Date.now() - healthLastSegmentChangedAt) / 1000);
        const staleByTime = Boolean(programTime) && lag > maxProgramLagSeconds;
        const staleBySegment = sameSegmentSeconds > maxSameSegmentSeconds;

        if (staleByTime || staleBySegment) {
            streamWasDown = true;
            setStatus('Reconnecting');
            setLabel('Waiting for stream...');
            console.warn('Playlist health stale:', {
                lag,
                sameSegmentSeconds,
                currentSegment,
                programTime
            });
            return;
        }

        if (streamWasDown) {
            streamWasDown = false;
            reloadPlayerAfterHealthRecovery('playlist became live again');
        }
    } catch (error) {
        streamWasDown = true;
        setStatus('Reconnecting');
        setLabel('Waiting for stream...');
        console.warn('Playlist health check failed:', error);
    }
}

function startPlaylistHealthMonitor() {
    if (healthCheckTimer) return;
    healthCheckTimer = setInterval(checkPlaylistHealth, healthCheckIntervalMs);
    checkPlaylistHealth();
}

function destroyHls() {
    if (hls) {
        try {
            hls.destroy();
        } catch (e) {
            console.warn('Error destroying HLS instance:', e);
        }
        hls = null;
    }
}

async function initHlsPlayer() {
    clearTimeout(reloadTimer);
    reloadTimer = null;

    setStatus('Loading');
    setLabel('Loading generated Toonami stream...');

    playlistHealthSrc = videoSrc;
    console.info('Using generated HLS stream:', videoSrc);

    setStatus('Live');
    setLabel('Toonami');

    if (window.Hls && Hls.isSupported()) {
        destroyHls();

        hls = new Hls({
            lowLatencyMode: false,
            backBufferLength: 30,
            liveSyncDurationCount: 3,
            liveMaxLatencyDurationCount: 10,
            manifestLoadingMaxRetry: 12,
            manifestLoadingRetryDelay: 1000,
            manifestLoadingMaxRetryTimeout: 8000,
            fragLoadingMaxRetry: 12,
            fragLoadingRetryDelay: 1000,
            fragLoadingMaxRetryTimeout: 8000,
            levelLoadingMaxRetry: 12,
            levelLoadingRetryDelay: 1000,
            levelLoadingMaxRetryTimeout: 8000
        });

        hls.loadSource(videoSrc);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, function () {
            recoveryAttempts = 0;
            setStatus('Live');
            setLabel('Toonami');
            safePlay();
        });

        hls.on(Hls.Events.ERROR, function (event, data) {
            console.warn('HLS error:', data);

            if (!data || !data.fatal) return;

            recoveryAttempts += 1;
            setStatus('Recovering');
            setLabel('Recovering stream...');

            if (recoveryAttempts > maxRecoveryAttempts) {
                schedulePageReload('too many HLS recovery attempts');
                return;
            }

            if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                setTimeout(function () {
                    if (hls) {
                        hls.startLoad();
                        safePlay();
                    }
                }, 1500);
                return;
            }

            if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                try {
                    hls.recoverMediaError();
                    safePlay();
                } catch (e) {
                    schedulePageReload('media recovery failed');
                }
                return;
            }

            schedulePageReload(data.details || data.type || 'unrecoverable HLS error');
        });

    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = videoSrc;

        video.addEventListener('loadedmetadata', function () {
            setStatus('Live');
            setLabel('Toonami');
            safePlay();
        });
    } else {
        setStatus('Error');
        setLabel('This browser does not support HLS playback.');
    }

    video.addEventListener('stalled', function () {
        setStatus('Buffering');
    });

    video.addEventListener('waiting', function () {
        setStatus('Buffering');
    });

    video.addEventListener('playing', function () {
        recoveryAttempts = 0;
        setStatus('Live');
        setLabel('Toonami');
    });

    video.addEventListener('error', function () {
        console.warn('Native video error:', video.error);
        schedulePageReload('native video element error');
    });
}

function openGuide() {
    guidePanel.classList.add('open');
    guideOverlay.classList.add('open');
    renderGuide();
}

function closeGuide() {
    guidePanel.classList.remove('open');
    guideOverlay.classList.remove('open');
}

guideButton.addEventListener('click', openGuide);
guideClose.addEventListener('click', closeGuide);
guideOverlay.addEventListener('click', closeGuide);

document.addEventListener('keydown', function (event) {
    if (event.key === 'Escape') closeGuide();
});

function xmlText(node, selector) {
    const item = node.querySelector(selector);
    return item ? item.textContent.trim() : '';
}

function parseXmltvDate(value) {
    if (!value) return null;

    const match = value.match(/^(\d{4})(\d{2})(\d{2})(\d{2})(\d{2})(\d{2})\s([+-]\d{4})$/);
    if (!match) return null;

    const year = match[1];
    const month = match[2];
    const day = match[3];
    const hour = match[4];
    const minute = match[5];
    const second = match[6];
    const offset = match[7];
    const offsetFormatted = offset.slice(0, 3) + ':' + offset.slice(3);

    return new Date(`${year}-${month}-${day}T${hour}:${minute}:${second}${offsetFormatted}`);
}

function formatTime(date) {
    return date.toLocaleTimeString([], {
        hour: 'numeric',
        minute: '2-digit'
    });
}

function escapeHtml(value) {
    return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
}

async function loadGuide() {
    try {
        const response = await fetch(xmltvSrc + '?t=' + Date.now(), {
            cache: 'no-store',
            headers: {
                'Cache-Control': 'no-cache',
                'Pragma': 'no-cache'
            }
        });

        if (!response.ok) {
            throw new Error(`Guide request failed: ${response.status}`);
        }

        const xmlTextResponse = await response.text();
        const xml = new DOMParser().parseFromString(xmlTextResponse, 'application/xml');

        const parseError = xml.querySelector('parsererror');
        if (parseError) {
            throw new Error('Could not parse XMLTV response.');
        }

        const channels = Array.from(xml.querySelectorAll('channel')).map(function (channel) {
            return {
                id: channel.getAttribute('id'),
                name: xmlText(channel, 'display-name')
            };
        });

        const allPrograms = Array.from(xml.querySelectorAll('programme'))
            .map(function (programme) {
                const start = parseXmltvDate(programme.getAttribute('start'));
                const stop = parseXmltvDate(programme.getAttribute('stop'));

                return {
                    channel: programme.getAttribute('channel'),
                    start,
                    stop,
                    title: xmlText(programme, 'title'),
                    subtitle: xmlText(programme, 'sub-title'),
                    desc: xmlText(programme, 'desc'),
                    rating: xmlText(programme, 'rating value'),
                    episode: Array.from(programme.querySelectorAll('episode-num'))
                        .find(function (ep) {
                            return ep.getAttribute('system') === 'onscreen';
                        })?.textContent.trim() || '',
                    image: programme.querySelector('icon')?.getAttribute('src') || ''
                };
            })
            .filter(function (program) {
                return program.channel && program.start && program.stop;
            })
            .sort(function (a, b) {
                return a.start - b.start;
            });

        const now = new Date();

        if (!guideChannelId || !allPrograms.some(function (program) { return program.channel === guideChannelId; })) {
            const namedChannel = channels.find(function (channel) {
                const name = String(channel.name || '').toLowerCase();
                return name.includes('toonami') || name.includes('nostalgia') || name.includes('after hours');
            });

            const currentlyAiring = allPrograms.find(function (program) {
                return program.start <= now && program.stop > now;
            });

            const countsByChannel = allPrograms.reduce(function (counts, program) {
                counts[program.channel] = (counts[program.channel] || 0) + 1;
                return counts;
            }, {});

            const busiestChannel = Object.entries(countsByChannel)
                .sort(function (a, b) { return b[1] - a[1]; })[0]?.[0];

            guideChannelId = namedChannel?.id || currentlyAiring?.channel || busiestChannel || null;
        }

        guidePrograms = allPrograms.filter(function (program) {
            return program.channel === guideChannelId;
        });

        const guideChannelName = channels.find(function (channel) {
            return channel.id === guideChannelId;
        })?.name || 'Toonami';

        guideUpdated.textContent = `${guideChannelName} · Updated ${new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })}`;
        renderGuide();
    } catch (error) {
        console.error(error);
        guideContent.innerHTML = `
            <div class="guide-error">
                Could not load the generated guide. The stream can still play.
            </div>
        `;
        guideUpdated.textContent = 'Guide unavailable';
    }
}

function renderGuide() {
    if (!guidePrograms.length) {
        guideContent.innerHTML = `
            <div class="now-card">
                <div class="now-label">Guide</div>
                <div class="now-title">Loading schedule...</div>
            </div>
        `;
        return;
    }

    const now = new Date();

    const current = guidePrograms.find(function (program) {
        return program.start <= now && program.stop > now;
    });

    const upcoming = guidePrograms
        .filter(function (program) {
            return program.stop > now;
        })
        .slice(0, 18);

    let currentHtml = '';

    if (current) {
        const total = current.stop - current.start;
        const elapsed = now - current.start;
        const progress = Math.max(0, Math.min(100, (elapsed / total) * 100));

        currentHtml = `
            <div class="now-card">
                <div class="now-label">Now Playing</div>
                <div class="now-title">${escapeHtml(current.title)}</div>
                ${current.subtitle ? `<div class="now-subtitle">${escapeHtml(current.subtitle)}</div>` : ''}
                <div class="progress-wrap">
                    <div class="progress-bar" style="width:${progress}%"></div>
                </div>
                <div class="now-time">
                    ${formatTime(current.start)} – ${formatTime(current.stop)}
                    ${current.episode ? ` · ${escapeHtml(current.episode)}` : ''}
                    ${current.rating ? ` · ${escapeHtml(current.rating)}` : ''}
                </div>
            </div>
        `;
    } else {
        currentHtml = `
            <div class="now-card">
                <div class="now-label">Live</div>
                <div class="now-title">No current programme found</div>
            </div>
        `;
    }

    const upcomingHtml = upcoming.map(function (program) {
        return `
            <div class="programme">
                <div class="programme-time">
                    ${formatTime(program.start)}<br>
                    ${formatTime(program.stop)}
                </div>
                <div>
                    <div class="programme-title">${escapeHtml(program.title)}</div>
                    ${program.subtitle ? `<div class="programme-subtitle">${escapeHtml(program.subtitle)}</div>` : ''}
                    ${program.episode || program.rating ? `
                        <div class="programme-subtitle">
                            ${escapeHtml([program.episode, program.rating].filter(Boolean).join(' · '))}
                        </div>
                    ` : ''}
                    ${program.desc ? `<div class="programme-desc">${escapeHtml(program.desc)}</div>` : ''}
                </div>
            </div>
        `;
    }).join('');

    guideContent.innerHTML = currentHtml + upcomingHtml;
}

    let currentBlockId = null;

    async function checkVersion() {

            // at /toonami-live/version.json when the page is served from that
            // directory.
            const response = await fetch('version.json?' + Date.now(), {

            if (!currentBlockId) {
                // Initialize the current block id on first read
                currentBlockId = blockId;
                return;
            }
            if (blockId && blockId !== currentBlockId) {
                console.warn('Detected new block version. Reloading page.');
                window.location.reload();
            }

            console.error('Version monitor error:', error);
        }
