<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple TV Channel</title>
</head>
<body>
    <h1>Simple TV Channel Player</h1>
    <video id="player" controls autoplay></video>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        const hlsSrc = '/path/to/toonami-live/index.m3u8';
        const xmltvSrc = '/path/to/toonami-live/xmltv.xml';

        async function loadGuide() {
            const response = await fetch(xmltvSrc + '?t=' + Date.now(), {
                cache: 'no-store',
                headers: {
                    'Cache-Control': 'no-cache',
                    'Pragma': 'no-cache'
                }
            });
            const xmlText = await response.text();
            console.log('XMLTV loaded:', xmlText.slice(0, 200), '...');
        }

        function setupPlayer() {
            const video = document.getElementById('player');
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(hlsSrc);
                hls.attachMedia(video);
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = hlsSrc;
            }
        }

        setupPlayer();
        setInterval(loadGuide, 300000); // refresh guide every 5 minutes
    </script>
</body>
</html>
