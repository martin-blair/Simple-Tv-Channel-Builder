

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Retro Stream Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
:root {
    --glow-blue: #00bfff;
    --text-blue: #bff6ff;
    --bg-deep: #020617;
    --panel-bg: rgba(2, 6, 23, 0.94);
    --panel-border: rgba(111, 220, 255, 0.25);
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    overflow: hidden;
    font-family: Arial, Helvetica, sans-serif;
    color: white;
    background:
        radial-gradient(circle at center, #0a1035 0%, #020617 40%, #000000 100%);
    display: flex;
    justify-content: center;
    align-items: center;
}

.channel-brand {
    position: absolute;
    top: 38px;
    left: 50%;
    transform: translateX(-50%);
    color: #6fdcff;
    font-size: clamp(1.1rem, 2vw, 2rem);
    font-weight: 900;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    text-shadow:
        0 0 10px var(--glow-blue),
        0 0 30px var(--glow-blue);
    opacity: 0.95;
    z-index: 10;
    white-space: nowrap;
}

.stage {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100vw;
    height: 100vh;
}

.ambient {
    position: absolute;
    width: 1200px;
    height: 700px;
    background: radial-gradient(
        ellipse at center,
        rgba(0,120,255,0.20),
        rgba(0,120,255,0.08) 35%,
        transparent 72%
    );
    filter: blur(80px);
    z-index: 0;
}

.tv-shell {
    position: relative;
    width: min(82vw, 1250px);
    aspect-ratio: 16 / 9;
    overflow: hidden;
    background: #000;
    border-radius: 28px;
    border: 3px solid rgba(120,180,255,0.16);
    box-shadow:
        0 0 15px rgba(0,180,255,0.7),
        0 0 50px rgba(0,140,255,0.5),
        0 0 120px rgba(0,100,255,0.25),
        inset 0 0 80px rgba(255,255,255,0.05),
        inset 0 0 140px rgba(0,0,0,0.8);
    z-index: 2;
}

.tv-shell::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
        radial-gradient(circle at center,
        transparent 54%,
        rgba(0,0,0,0.38) 100%);
    pointer-events: none;
    z-index: 5;
}

.tv-shell::after {
    content: "";
    position: absolute;
    top: 0;
    left: -42%;
    width: 62%;
    height: 100%;
    background: linear-gradient(
        120deg,
        rgba(255,255,255,0.13),
        rgba(255,255,255,0.035),
        transparent 70%
    );
    transform: skewX(-12deg);
    pointer-events: none;
    z-index: 6;
}

video {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    background: #000;
    filter: contrast(1.08) saturate(1.10) brightness(0.96);
}

.crt {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
        repeating-linear-gradient(
            to bottom,
            rgba(255,255,255,0.035) 0px,
            rgba(255,255,255,0.035) 1px,
            transparent 2px,
            transparent 4px
        );
    opacity: 0.35;
    animation: flicker 0.12s infinite;
    z-index: 4;
}

.vignette {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
        radial-gradient(circle at center,
            transparent 35%,
            rgba(0,0,0,0.12) 62%,
            rgba(0,0,0,0.48) 100%);
    z-index: 7;
}

.channel-label {
    position: absolute;
    bottom: 16px;
    left: 22px;
    color: var(--text-blue);
    font-size: clamp(1rem, 1.7vw, 1.45rem);
    font-weight: 900;
    letter-spacing: 0.06em;
    text-shadow:
        0 0 5px #00d9ff,
        0 0 12px #00d9ff,
        0 0 24px rgba(0,217,255,0.5);
    z-index: 9;
}

.status {
    position: absolute;
    top: 14px;
    right: 18px;
    padding: 6px 10px;
    border: 1px solid rgba(191,246,255,0.25);
    border-radius: 999px;
    color: rgba(191,246,255,0.9);
    background: rgba(0,0,0,0.35);
    font-size: 0.78rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    text-shadow: 0 0 8px rgba(0,217,255,0.5);
    z-index: 9;
}

.guide-button {
    position: absolute;
    top: 14px;
    left: 18px;
    z-index: 12;
    border: 1px solid rgba(191,246,255,0.35);
    border-radius: 999px;
    background: rgba(0,0,0,0.45);
    color: var(--text-blue);
    padding: 8px 13px;
    font-size: 0.82rem;
    font-weight: 900;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    text-shadow: 0 0 8px rgba(0,217,255,0.55);
    box-shadow: 0 0 14px rgba(0,191,255,0.18);
}

.guide-button:hover {
    background: rgba(0,191,255,0.16);
}

.guide-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.22s ease;
    z-index: 20;
}

.guide-overlay.open {
    opacity: 1;
    pointer-events: auto;
}

.guide-panel {
    position: fixed;
    top: 0;
    right: 0;
    width: min(460px, 92vw);
    height: 100vh;
    background: var(--panel-bg);
    border-left: 1px solid var(--panel-border);
    box-shadow:
        -10px 0 40px rgba(0,0,0,0.65),
        0 0 30px rgba(0,191,255,0.18);
    transform: translateX(105%);
    transition: transform 0.25s ease;
    z-index: 21;
    display: flex;
    flex-direction: column;
}

.guide-panel.open {
    transform: translateX(0);
}

.guide-header {
    padding: 22px 22px 16px;
    border-bottom: 1px solid rgba(191,246,255,0.16);
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: flex-start;
}

.guide-title {
    margin: 0;
    color: #6fdcff;
    font-size: 1.3rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-shadow: 0 0 15px rgba(0,191,255,0.65);
}

.guide-subtitle {
    margin: 6px 0 0;
    color: rgba(191,246,255,0.72);
    font-size: 0.85rem;
}

.guide-close {
    border: 1px solid rgba(191,246,255,0.3);
    background: rgba(255,255,255,0.04);
    color: white;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.15rem;
}

.guide-content {
    padding: 16px 18px 24px;
    overflow-y: auto;
}

.now-card {
    border: 1px solid rgba(111,220,255,0.28);
    background: linear-gradient(135deg, rgba(0,191,255,0.16), rgba(0,0,0,0.32));
    border-radius: 18px;
    padding: 14px;
    margin-bottom: 16px;
    box-shadow: 0 0 18px rgba(0,191,255,0.12);
}

.now-label {
    color: rgba(191,246,255,0.78);
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 8px;
}

.now-title {
    font-size: 1.2rem;
    font-weight: 900;
    margin-bottom: 4px;
}

.now-subtitle {
    color: rgba(255,255,255,0.82);
    font-size: 0.92rem;
    margin-bottom: 10px;
}

.progress-wrap {
    height: 7px;
    border-radius: 999px;
    background: rgba(255,255,255,0.15);
    overflow: hidden;
    margin: 10px 0 8px;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00bfff, #bff6ff);
    box-shadow: 0 0 12px rgba(0,191,255,0.75);
}

.now-time {
    color: rgba(191,246,255,0.72);
    font-size: 0.78rem;
}

.programme {
    display: grid;
    grid-template-columns: 78px 1fr;
    gap: 12px;
    padding: 13px 4px;
    border-bottom: 1px solid rgba(191,246,255,0.11);
}

.programme-time {
    color: rgba(191,246,255,0.72);
    font-size: 0.78rem;
    line-height: 1.35;
}

.programme-title {
    font-weight: 900;
    font-size: 0.98rem;
    margin-bottom: 3px;
}

.programme-subtitle {
    color: rgba(255,255,255,0.76);
    font-size: 0.85rem;
    margin-bottom: 5px;
}

.programme-desc {
    color: rgba(255,255,255,0.55);
    font-size: 0.78rem;
    line-height: 1.35;
}

.guide-error {
    color: #ffd0d0;
    border: 1px solid rgba(255,120,120,0.3);
    background: rgba(255,0,0,0.08);
    border-radius: 14px;
    padding: 12px;
}

@keyframes flicker {
    0% { opacity: 0.31; }
    50% { opacity: 0.39; }
    100% { opacity: 0.33; }
}

@media (max-width: 800px) {
    .tv-shell {
        width: 94vw;
        border-radius: 18px;
    }

    .channel-brand {
        top: 18px;
        letter-spacing: 0.2em;
    }

    .status {
        display: none;
    }

    .guide-button {
        top: auto;
        bottom: 16px;
        right: 16px;
        left: auto;
    }
}
</style>
</head>

<body>
 <main class="stage">
 <div class="ambient"></div>
 <div class="channel-brand">Retro Stream Player</div>

 <section class="tv-shell" aria-label="Retro Stream Player live player">
 <video id="video" autoplay muted controls playsinline></video>
 <button class="guide-button" id="guideButton" type="button">Guide</button>
 <div class="crt"></div>
 <div class="vignette"></div>
 <div class="status" id="status">Live</div>
 <div class="channel-label" id="channelLabel">Retro Stream</div>
 </section>
 </main>

 <div class="guide-overlay" id="guideOverlay"></div>

 <aside class="guide-panel" id="guidePanel" aria-label="TV Guide">
 <div class="guide-header">
 <div>
 <h2 class="guide-title">TV Guide</h2>
 <p class="guide-subtitle" id="guideUpdated">Loading schedule...</p>
 </div>
 <button class="guide-close" id="guideClose" type="button" aria-label="Close guide">×</button>
 </div>
 <div class="guide-content" id="guideContent">
 <div class="now-card">
 <div class="now-label">Loading</div>
 <div class="now-title">Fetching generated guide...</div>
 </div>
 </div>
 </aside>

<script>
const video = document.getElementById('video');
const channelLabel = document.getElementById('channelLabel');
const statusBadge = document.getElementById('status');

const guideButton = document.getElementById('guideButton');
const guideClose = document.getElementById('guideClose');
const guidePanel = document.getElementById('guidePanel');
const guideOverlay = document.getElementById('guideOverlay');
const guideContent = document.getElementById('guideContent');
const guideUpdated = document.getElementById('guideUpdated');

// Generated Retro Stream HLS endpoints.
const streamBaseUrl = window.STREAM_BASE_URL || 'https://example.com/path-to-your-hls-stream';

const videoSrc = `${streamBaseUrl}/index.m3u8`;
const xmltvSrc = `${streamBaseUrl}/xmltv.xml`;
const versionSrc = `${streamBaseUrl}/version.json`;

let playlistHealthSrc = videoSrc;
let guideChannelId = null;

let hls = null;
let reloadTimer = null;
let recoveryAttempts = 0;
const maxRecoveryAttempts = 8;

let guidePrograms = [];
let currentBlockId = null;
let currentVersion = null;
let initialSyncApplied = false;
let lastLiveSyncAt = 0;
let lastStoredPositionAt = 0;

const liveSyncCheckIntervalMs = 15000;
const liveSyncDriftToleranceSeconds = 8;
const localPlaybackKey = 'retro_stream_player_last_position';

function setStatus(text) {
    statusBadge.textContent = text;
}

function setLabel(text) {
    channelLabel.textContent = text;
}

function safePlay() {
    video.play().catch(function () {});
}

function cacheBust(url) {
    const separator = url.includes('?') ? '&' : '?';
    return `${url}${separator}t=${Date.now()}`;
}

function fetchNoCache(url, options = {}) {
    // CORS-safe: cache-bust via query string only.
    // Do not set Cache-Control, Pragma, Accept, or other custom headers here,
    // because cross-origin custom headers trigger a browser preflight.
    return fetch(cacheBust(url), {
        cache: 'no-store',
        ...options
    });
}

function schedulePageReload(reason, delayMs = 1200) {
    console.warn('Scheduling page reload:', reason);

    if (reloadTimer) return;

    setStatus('Reloading');
    setLabel('Loading new block...');

    reloadTimer = setTimeout(function () {
        window.location.reload();
    }, delayMs);
}

function destroyHls() {
    if (hls) {
        try {
            hls.destroy();
        } catch (e) {
            console.warn('Error destroying HLS instance:', e);
        }
        hls = null;
    }
}

function xmlText(node, selector) {
    const item = node.querySelector(selector);
    return item ? item.textContent.trim() : '';
}

function parseXmltvDate(value) {
    if (!value) return null;

    const match = value.match(/^(\d{4})(\d{2})(\d{2})(\d{2})(\d{2})(\d{2})\s([+-]\d{4})$/);
    if (!match) return null;

    const year = match[1];
    const month = match[2];
    const day = match[3];
    const hour = match[4];
    const minute = match[5];
    const second = match[6];
    const offset = match[7];
    const offsetFormatted = offset.slice(0, 3) + ':' + offset.slice(3);

    return new Date(`${year}-${month}-${day}T${hour}:${minute}:${second}${offsetFormatted}`);
}

function formatTime(date) {
    return date.toLocaleTimeString([], {
        hour: 'numeric',
        minute: '2-digit'
    });
}

function escapeHtml(value) {
    return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
}

function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
}

function getBlockDurationSeconds() {
    if (currentVersion && Number(currentVersion.duration_seconds) > 0) {
        return Number(currentVersion.duration_seconds);
    }

    if (guidePrograms.length) {
        const first = guidePrograms[0].start;
        const last = guidePrograms[guidePrograms.length - 1].stop;
        const seconds = Math.floor((last - first) / 1000);
        if (seconds > 0) return seconds;
    }

    return 24 * 60 * 60;
}

function getBlockStartDate() {
    // Use an explicit block_start from version.json if the builder provides it.
    // Do NOT use generated_at as the normal timeline source: generated_at can
    // represent when the file/version was written, not when the 24h block starts.
    if (currentVersion && currentVersion.block_start) {
        const parsed = new Date(currentVersion.block_start);
        if (!Number.isNaN(parsed.getTime())) return parsed;
    }

    // XMLTV is generated with the block and its first programme start matches
    // the actual beginning of the 24h playlist when block_start is absent.
    if (guidePrograms.length && guidePrograms[0].start) {
        return guidePrograms[0].start;
    }

    // Last-resort fallback only, so the player can still do something if the
    // guide fails to load. This should not be the normal path.
    if (currentVersion && currentVersion.generated_at) {
        const parsed = new Date(currentVersion.generated_at);
        if (!Number.isNaN(parsed.getTime())) return parsed;
    }

    return null;
}

function getLiveOffsetSeconds() {
    const blockStart = getBlockStartDate();
    const duration = getBlockDurationSeconds();

    if (!blockStart || !duration) {
        return 0;
    }

    const elapsed = Math.floor((Date.now() - blockStart.getTime()) / 1000);

    if (elapsed < 0) {
        return 0;
    }

    return elapsed % duration;
}

/**
 * Compute the resume offset based on a locally stored playback snapshot. This allows
 * viewers who refresh or close the page to resume where they would have been if they
 * had remained tuned in. If no snapshot is found, or it does not match the current
 * block, fall back to the regular live offset.
 */
function getResumeOffsetSeconds() {
    const liveOffset = getLiveOffsetSeconds();

    try {
        const snapJson = localStorage.getItem(localPlaybackKey);
        if (!snapJson) return liveOffset;

        const snap = JSON.parse(snapJson);
        if (!snap || !snap.block_id || snap.block_id !== currentBlockId ||
            typeof snap.position_seconds !== 'number' || !snap.saved_at) {
            return liveOffset;
        }

        const savedAtMs = new Date(snap.saved_at).getTime();
        if (!Number.isFinite(savedAtMs)) return liveOffset;

        const elapsed = Math.floor((Date.now() - savedAtMs) / 1000);
        const duration = getBlockDurationSeconds();
        if (duration <= 0) return liveOffset;

        const resumeOffset = (snap.position_seconds + elapsed) % duration;

        // Local storage is only for short continuity. It must never drag a viewer
        // away from the global live timeline by minutes or hours.
        const drift = Math.abs(resumeOffset - liveOffset);
        const wrappedDrift = Math.min(drift, Math.abs(duration - drift));

        if (wrappedDrift > 120) {
            console.warn('Ignoring stale local resume snapshot:', {
                resumeOffset,
                liveOffset,
                wrappedDrift
            });
            localStorage.removeItem(localPlaybackKey);
            return liveOffset;
        }

        return resumeOffset;
    } catch (err) {
        console.warn('Failed to compute resume offset:', err);
        return liveOffset;
    }
}

function storePlaybackSnapshot() {
    try {
        const payload = {
            block_id: currentBlockId || null,
            position_seconds: Number.isFinite(video.currentTime) ? video.currentTime : 0,
            live_offset_seconds: getLiveOffsetSeconds(),
            saved_at: new Date().toISOString()
        };

        localStorage.setItem(localPlaybackKey, JSON.stringify(payload));
    } catch (error) {
        console.warn('Could not store playback snapshot:', error);
    }
}

function maybeStorePlaybackSnapshot() {
    const now = Date.now();
    if (now - lastStoredPositionAt < 15000) return;
    lastStoredPositionAt = now;
    storePlaybackSnapshot();
}

function seekToLiveOffset(reason, force = false) {
    if (!Number.isFinite(video.duration) || video.duration <= 0) {
        return false;
    }

        // Determine the desired seek target from the resume offset (if available) or fall back
        // to the regular live offset. Resume offsets allow continuity across refreshes.
        const resumeOffset = getResumeOffsetSeconds();
        const target = clamp(resumeOffset, 0, Math.max(0, video.duration - 2));
    const current = Number.isFinite(video.currentTime) ? video.currentTime : 0;
    const drift = Math.abs(current - target);

    if (!force && drift < liveSyncDriftToleranceSeconds) {
        return false;
    }

    console.info('Syncing live position:', {
        reason,
        target,
        current,
        drift
    });

    try {
        video.currentTime = target;
        storePlaybackSnapshot();
        return true;
    } catch (error) {
        console.warn('Could not sync live position:', error);
        return false;
    }
}

function startLiveSyncMonitor() {
    setInterval(function () {
        const now = Date.now();

        if (now - lastLiveSyncAt < liveSyncCheckIntervalMs) return;
        lastLiveSyncAt = now;

        if (!document.hidden && !video.paused) {
            seekToLiveOffset('periodic live sync');
        }
    }, 5000);
}

async function loadVersion() {
    try {
        const response = await fetchNoCache(versionSrc);

        if (!response.ok) {
            console.warn('Version request failed:', response.status);
            return null;
        }

        const data = await response.json();
        currentVersion = data;
        currentBlockId = data.block_id || data.generated_at || currentBlockId;
        return data;
    } catch (error) {
        console.warn('Version request failed:', error);
        return null;
    }
}

async function checkVersion() {
    try {
        const response = await fetchNoCache(versionSrc);

        if (!response.ok) {
            console.warn('Version monitor request failed:', response.status);
            return;
        }

        const data = await response.json();
        const blockId = data.block_id || data.generated_at || null;

        if (!currentBlockId) {
            currentBlockId = blockId;
            currentVersion = data;
            return;
        }

        if (blockId && blockId !== currentBlockId) {
            console.warn('Detected new block version. Reloading page.', {
                oldBlockId: currentBlockId,
                newBlockId: blockId
            });

            try {
                localStorage.removeItem(localPlaybackKey);
            } catch (error) {}

            schedulePageReload('new block version detected', 1000);
        }
    } catch (error) {
        console.error('Version monitor error:', error);
    }
}

async function checkPlaylistHealth() {
    // This stream is a pre-generated 24h HLS block, not a continuously growing
    // live encoder playlist. A repeated final segment is normal and must not be
    // treated as stale. This check only verifies that the published manifest is
    // still reachable and looks like HLS.
    try {
        const response = await fetchNoCache(playlistHealthSrc);

        if (!response.ok) {
            console.warn('Playlist availability request failed:', response.status);
            return false;
        }

        const playlistText = await response.text();

        if (!playlistText.includes('#EXTM3U')) {
            console.warn('Playlist availability check did not find an HLS manifest.');
            return false;
        }

        return true;
    } catch (error) {
        console.warn('Playlist availability check failed:', error);
        return false;
    }
}

async function initHlsPlayer() {
    clearTimeout(reloadTimer);
    reloadTimer = null;

    setStatus('Loading');
    setLabel('Loading generated Retro Stream stream...');

    playlistHealthSrc = videoSrc;
    console.info('Using configured HLS stream:', videoSrc);

    if (window.Hls && Hls.isSupported()) {
        destroyHls();

        hls = new Hls({
            lowLatencyMode: false,
            backBufferLength: 30,
            maxBufferLength: 90,
            maxMaxBufferLength: 180,
            manifestLoadingMaxRetry: 12,
            manifestLoadingRetryDelay: 1000,
            manifestLoadingMaxRetryTimeout: 8000,
            fragLoadingMaxRetry: 12,
            fragLoadingRetryDelay: 1000,
            fragLoadingMaxRetryTimeout: 8000,
            levelLoadingMaxRetry: 12,
            levelLoadingRetryDelay: 1000,
            levelLoadingMaxRetryTimeout: 8000
        });

        hls.loadSource(cacheBust(videoSrc));
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, function () {
            recoveryAttempts = 0;
            setStatus('Live');
            setLabel('Retro Stream');

            if (!initialSyncApplied) {
                initialSyncApplied = true;
                seekToLiveOffset('initial manifest parsed sync', true);
            }

            safePlay();
        });

        hls.on(Hls.Events.ERROR, function (event, data) {
            console.warn('HLS error:', data);

            if (!data || !data.fatal) return;

            recoveryAttempts += 1;
            setStatus('Recovering');
            setLabel('Recovering stream...');

            if (recoveryAttempts > maxRecoveryAttempts) {
                schedulePageReload('too many HLS recovery attempts');
                return;
            }

            if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                setTimeout(function () {
                    if (hls) {
                        hls.startLoad();
                        safePlay();
                    }
                }, 1500);
                return;
            }

            if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                try {
                    hls.recoverMediaError();
                    safePlay();
                } catch (e) {
                    schedulePageReload('media recovery failed');
                }
                return;
            }

            schedulePageReload(data.details || data.type || 'unrecoverable HLS error');
        });

    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = cacheBust(videoSrc);

        video.addEventListener('loadedmetadata', function () {
            setStatus('Live');
            setLabel('Retro Stream');

            if (!initialSyncApplied) {
                initialSyncApplied = true;
                seekToLiveOffset('native loadedmetadata sync', true);
            }

            safePlay();
        });
    } else {
        setStatus('Error');
        setLabel('This browser does not support HLS playback.');
    }

    video.addEventListener('stalled', function () {
        setStatus('Buffering');
    });

    video.addEventListener('waiting', function () {
        setStatus('Buffering');
    });

    video.addEventListener('playing', function () {
        recoveryAttempts = 0;
        setStatus('Live');
        setLabel('Retro Stream');
        seekToLiveOffset('playing event sync');
    });

    video.addEventListener('pause', storePlaybackSnapshot);
    video.addEventListener('timeupdate', maybeStorePlaybackSnapshot);

    video.addEventListener('error', function () {
        console.warn('Native video error:', video.error);
        schedulePageReload('native video element error');
    });
}

function openGuide() {
    guidePanel.classList.add('open');
    guideOverlay.classList.add('open');
    renderGuide();
}

function closeGuide() {
    guidePanel.classList.remove('open');
    guideOverlay.classList.remove('open');
}

guideButton.addEventListener('click', openGuide);
guideClose.addEventListener('click', closeGuide);
guideOverlay.addEventListener('click', closeGuide);

document.addEventListener('keydown', function (event) {
    if (event.key === 'Escape') closeGuide();
});

async function loadGuide() {
    try {
        const response = await fetchNoCache(xmltvSrc);

        if (!response.ok) {
            throw new Error(`Guide request failed: ${response.status}`);
        }

        const xmlTextResponse = await response.text();
        const xml = new DOMParser().parseFromString(xmlTextResponse, 'application/xml');

        const parseError = xml.querySelector('parsererror');
        if (parseError) {
            throw new Error('Could not parse XMLTV response.');
        }

        const channels = Array.from(xml.querySelectorAll('channel')).map(function (channel) {
            return {
                id: channel.getAttribute('id'),
                name: xmlText(channel, 'display-name')
            };
        });

        const allPrograms = Array.from(xml.querySelectorAll('programme'))
            .map(function (programme) {
                const start = parseXmltvDate(programme.getAttribute('start'));
                const stop = parseXmltvDate(programme.getAttribute('stop'));

                return {
                    channel: programme.getAttribute('channel'),
                    start,
                    stop,
                    title: xmlText(programme, 'title'),
                    subtitle: xmlText(programme, 'sub-title'),
                    desc: xmlText(programme, 'desc'),
                    rating: xmlText(programme, 'rating value'),
                    episode: Array.from(programme.querySelectorAll('episode-num'))
                        .find(function (ep) {
                            return ep.getAttribute('system') === 'onscreen';
                        })?.textContent.trim() || '',
                    image: programme.querySelector('icon')?.getAttribute('src') || ''
                };
            })
            .filter(function (program) {
                return program.channel && program.start && program.stop;
            })
            .sort(function (a, b) {
                return a.start - b.start;
            });

        const now = new Date();

        if (!guideChannelId || !allPrograms.some(function (program) { return program.channel === guideChannelId; })) {
            const namedChannel = channels.find(function (channel) {
                const name = String(channel.name || '').toLowerCase();
                return name.includes('toonami') || name.includes('nostalgia') || name.includes('after hours');
            });

            const currentlyAiring = allPrograms.find(function (program) {
                return program.start <= now && program.stop > now;
            });

            const countsByChannel = allPrograms.reduce(function (counts, program) {
                counts[program.channel] = (counts[program.channel] || 0) + 1;
                return counts;
            }, {});

            const busiestChannel = Object.entries(countsByChannel)
                .sort(function (a, b) { return b[1] - a[1]; })[0]?.[0];

            guideChannelId = namedChannel?.id || currentlyAiring?.channel || busiestChannel || null;
        }

        guidePrograms = allPrograms.filter(function (program) {
            return program.channel === guideChannelId;
        });

        const guideChannelName = channels.find(function (channel) {
            return channel.id === guideChannelId;
        })?.name || 'Retro Stream';

        guideUpdated.textContent = `${guideChannelName} · Updated ${new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })}`;
        renderGuide();

        if (initialSyncApplied && !video.paused) {
            seekToLiveOffset('guide loaded sync');
        }
    } catch (error) {
        console.error(error);
        guideContent.innerHTML = `
            <div class="guide-error">
                Could not load the generated guide. The stream can still play.
            </div>
        `;
        guideUpdated.textContent = 'Guide unavailable';
    }
}

function renderGuide() {
    if (!guidePrograms.length) {
        guideContent.innerHTML = `
            <div class="now-card">
                <div class="now-label">Guide</div>
                <div class="now-title">Loading schedule...</div>
            </div>
        `;
        return;
    }

    const now = new Date();

    const current = guidePrograms.find(function (program) {
        return program.start <= now && program.stop > now;
    });

    const upcoming = guidePrograms
        .filter(function (program) {
            return program.stop > now;
        })
        .slice(0, 18);

    let currentHtml = '';

    if (current) {
        const total = current.stop - current.start;
        const elapsed = now - current.start;
        const progress = Math.max(0, Math.min(100, (elapsed / total) * 100));

        currentHtml = `
            <div class="now-card">
                <div class="now-label">Now Playing</div>
                <div class="now-title">${escapeHtml(current.title)}</div>
                ${current.subtitle ? `<div class="now-subtitle">${escapeHtml(current.subtitle)}</div>` : ''}
                <div class="progress-wrap">
                    <div class="progress-bar" style="width:${progress}%"></div>
                </div>
                <div class="now-time">
                    ${formatTime(current.start)} – ${formatTime(current.stop)}
                    ${current.episode ? ` · ${escapeHtml(current.episode)}` : ''}
                    ${current.rating ? ` · ${escapeHtml(current.rating)}` : ''}
                </div>
            </div>
        `;
    } else {
        currentHtml = `
            <div class="now-card">
                <div class="now-label">Live</div>
                <div class="now-title">No current programme found</div>
            </div>
        `;
    }

    const upcomingHtml = upcoming.map(function (program) {
        return `
            <div class="programme">
                <div class="programme-time">
                    ${formatTime(program.start)}<br>
                    ${formatTime(program.stop)}
                </div>
                <div>
                    <div class="programme-title">${escapeHtml(program.title)}</div>
                    ${program.subtitle ? `<div class="programme-subtitle">${escapeHtml(program.subtitle)}</div>` : ''}
                    ${program.episode || program.rating ? `
                        <div class="programme-subtitle">
                            ${escapeHtml([program.episode, program.rating].filter(Boolean).join(' · '))}
                        </div>
                    ` : ''}
                    ${program.desc ? `<div class="programme-desc">${escapeHtml(program.desc)}</div>` : ''}
                </div>
            </div>
        `;
    }).join('');

    guideContent.innerHTML = currentHtml + upcomingHtml;
}

document.addEventListener('visibilitychange', function () {
    if (!document.hidden) {
        safePlay();
        seekToLiveOffset('visibility restored sync', true);
        checkVersion();
        loadGuide();
    }
});

window.addEventListener('beforeunload', storePlaybackSnapshot);

async function boot() {
    await loadVersion();
    await loadGuide();
    await initHlsPlayer();

    // Do not run stale-segment monitoring. The builder publishes a fixed 24h
    // HLS block, so the playlist is not expected to grow like a live encoder.
    checkPlaylistHealth();
    startLiveSyncMonitor();

    checkVersion();
    setInterval(checkVersion, 60 * 1000);

    setInterval(loadGuide, 5 * 60 * 1000);
    setInterval(renderGuide, 30 * 1000);
}

boot();
</script>
