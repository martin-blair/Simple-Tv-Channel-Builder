<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple TV Channel</title>
    <!--
      This page streams an HLS playlist generated by the builder script.
      It uses hls.js to support browsers that do not natively play
      application/vnd.apple.mpegurl streams (e.g. Chrome/Firefox).  It
      also polls `version.json` once per minute; when the block id
      changes it reloads the page so the viewer seamlessly jumps to
      the newly published 24‑hour block.
    -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: sans-serif;
        background: #000;
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      #player {
        width: 100%;
        max-width: 960px;
        aspect-ratio: 16 / 9;
        background: #000;
      }
    </style>
  </head>
  <body>
    <video id="player" controls autoplay muted playsinline></video>
    <script>
      const video = document.getElementById('player');
      const videoSrc = 'index.m3u8';
      // Initialise hls.js if needed
      if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(videoSrc);
        hls.attachMedia(video);
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = videoSrc;
      } else {
        console.error('This browser cannot play HLS streams.');
      }
      // Version monitoring: reload when block id changes
      let currentId = null;
      async function checkVersion() {
        try {
          const res = await fetch('version.json?' + Date.now(), { cache: 'no-store' });
          if (!res.ok) return;
          const data = await res.json();
          const id = data.block_id || data.generated_at || null;
          if (currentId === null) {
            currentId = id;
            return;
          }
          if (id && id !== currentId) {
            // The stream has been updated – reload page
            window.location.reload();
          }
        } catch (err) {
          console.warn('Version check failed:', err);
        }
      }
      setInterval(checkVersion, 60 * 1000);
    </script>
  </body>
</html>
